schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
context: |
  Tech stack: Tauri v2, React 19, TypeScript, Rust, Python
  Frontend: React 19 with TypeScript, Vite build tool, pnpm package manager
  Backend: Rust (Tauri) with Qwen3 ASR engine for speech recognition
  Python: Utility scripts using uv-created .venv virtual environment
  Scripts: Mixed Python and Bash scripts in scripts/ directory
  Project type: Desktop application for voice-driven coding
  Key features: VAD-based recording, ASR transcription, real-time feedback
  Testing: vitest (frontend), cargo test (Rust), pytest (Python)
  Code location: src/ (frontend), src-tauri/ (backend), scripts/ (utility scripts)

  Quality Assurance (run after implementation):
  - Frontend (TypeScript/React):
    * pnpm build          # Type check + build (runs tsc + vite build)
    * pnpm test           # Run all vitest tests
  - Backend (Rust):
    * cargo test          # Run all Rust tests (workspace)
    * cargo clippy        # Run Rust linter (use --fix to auto-fix)
    * pnpm tauri build    # Full production build
  - Python scripts:
    * uv run pytest scripts/   # Run Python tests using uv
    * OR: .venv/bin/python -m pytest scripts/
  - Bash scripts:
    * Scripts use set -euo pipefail for error checking
    * Test by running script directly: ./scripts/script_name.sh

