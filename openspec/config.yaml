schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
context: |
  语言：中文（简体）
  所有产出物必须用简体中文撰写。
  Tech stack: Tauri v2, React 19, TypeScript, Rust, Python
  Frontend: React 19 with TypeScript, Vite build tool, Tailwind CSS, pnpm package manager
  Backend: Rust (Tauri) with Qwen3 ASR engine for speech recognition
  Python: Utility scripts using uv-created .venv virtual environment
  Scripts: Mixed Python and Bash scripts in scripts/ directory
  Project type: Desktop application for voice-driven coding
  Key features: VAD-based recording, ASR transcription, real-time feedback
  Testing: vitest (frontend), cargo test (Rust), pytest (Python)
  Code location: src/ (frontend), src-tauri/ (backend), scripts/ (utility scripts)

  Quality Assurance (run after implementation):
  - Frontend (TypeScript/React):
    * pnpm build          # Type check + build (runs tsc + vite build)
    * pnpm test           # Run all vitest tests
  - Backend (Rust):
    * cargo test          # Run all Rust tests (workspace)
    * cargo clippy        # Run Rust linter (use --fix to auto-fix)
    * pnpm tauri build    # Full production build
  - Python scripts:
    * uv run pytest scripts/   # Run Python tests using uv
    * OR: .venv/bin/python -m pytest scripts/
  - Bash scripts:
    * Scripts use set -euo pipefail for error checking
    * Test by running script directly: ./scripts/script_name.sh

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
rules:
  proposal:
    - Clearly separate product intent from implementation details.
    - List validation expectations when the change will require checks, tests, or builds.
  tasks:
    - Every implementation change must include quality-gate tasks for the touched stack, such as a code checker/linter, tests, and a build or typecheck step where applicable.
    - Do not mark implementation complete until the required checks pass or a blocker is recorded with a clear reason.
    - For TypeScript/React work, include `pnpm build` and `pnpm test`.
    - For Rust work, include `cargo test` and `cargo clippy`; add `pnpm tauri build` when the change affects the desktop bundle or backend integration.
    - For Python scripts, include `.venv/bin/python -m pytest scripts/` when scripts are changed.
    - Add an explicit verification task so the final state records which checks were run.
  archive:
    - Only archive a change after all implementation tasks are complete and the required checks are passing or explicitly justified as blocked.
    - If any required check is blocked, document the blocker in the change before archiving.
